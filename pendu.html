<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Jeu du pendu</title>
    <link rel="stylesheet" href="jeux.css">
</head>

<body>

    <main class="page-pendu">

        <h1>Jeu du pendu</h1>

        <section class="zone-pendu">

            <p id="vies" class="infos-pendu">Vies restantes : 6</p>

            <div class="barre-container">
                <div id="barreVie" class="barre-vie"></div>
            </div>

            <p id="motCache" class="mot-cache"></p>

            <label for="lettre" class="label-lettre">Choisis une lettre :</label>

            <input type="text" id="lettre" maxlength="1" placeholder="A">

            <button id="btnValider">Valider</button>

            <p id="lettresJouees" class="infos-pendu">Lettres jouées : aucune</p>

            <p id="message" class="message-pendu"></p>


        </section>

        <a href="index.html" class="btn-retour">← Accueil</a>

    </main>

    <script src="pendu.js"></script>
</body>

</html>
